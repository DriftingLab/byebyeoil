<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bye Bye Oil - 24h Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="topbar">
            <div class="top-left"><a class="dict-link" href="dictionary.html">Dictionary</a></div>
            <div class="top-center" id="timeDisplay">00:00</div>
            <div class="top-right"><span class="live-dot"></span><span class="live-text">LIVE</span></div>
        </header>

        <div class="main-content">
            <div class="artwork-area">
                <div class="artwork-box">
                    <canvas id="canvas"></canvas>
                </div>
            </div>
        </div>

        <div class="info-bottom">
            <table class="info-table">
                <tbody id="infoTable">
                    <tr class="info-row-1">
                        <td class="name-cell">
                            <div class="label">Name:</div>
                            <div class="value name-value">-</div>
                        </td>
                        <td class="price-cell">
                            <div class="label">Petroleum Material:</div>
                            <div class="value material-value">Material - related to petroleum</div>
                        </td>
                        <td class="usage-cell">
                            <div class="label">Usage:</div>
                            <div class="value usage-value">-</div>
                        </td>
                    </tr>
                    <tr class="info-row-2">
                        <td class="material-cell">
                            <div class="label">Price:</div>
                            <div class="value price-value">-</div>
                        </td>
                        <td class="replacement-cell">
                            <div class="label">Possible Replacement:</div>
                            <div class="value replacement-value">Replacement object</div>
                        </td>
                        <td class="empty-cell"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="products.js"></script>
    <script src="app.js"></script>
</body>
</html>
