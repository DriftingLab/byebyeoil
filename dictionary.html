<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bye Bye Oil - Dictionary</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            overflow: hidden;
        }

        .page {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: row;
        }

        .left-pane {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #bbb;
            padding: 0 18px;
            color: #444;
            font-size: 18px;
        }

        .top-left, .top-center, .top-right {
            display: flex;
            align-items: center;
        }

        .perf-link {
            text-decoration: none;
            color: #444;
            border-bottom: 1px solid #bbb;
            padding-bottom: 2px;
        }

        .top-center {
            flex: 1;
            justify-content: center;
            font-size: 22px;
            font-weight: 600;
            color: #555;
        }

        .top-left {
            width: 200px;
            justify-content: flex-start;
            padding-left: 6px;
        }

        .top-right {
            width: 200px;
            justify-content: flex-end;
            color: #666;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: stretch;
            position: relative;
            min-height: 0;
            overflow: hidden;
        }

        .artwork-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
            min-width: 0;
            overflow: hidden;
        }

        .artwork-box {
            width: 420px;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffffff;
            border-radius: 2px;
        }

        #dictCanvas {
            display: block;
        }

        .catalog {
            width: 280px;
            height: 100vh;
            border-left: 1px solid #bbb;
            overflow-y: auto;
            background: #fff;
            flex-shrink: 0;
        }

        .catalog-header {
            padding: 14px 18px;
            font-weight: 600;
            color: #555;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            background: #fff;
        }

        .catalog-item {
            padding: 10px 18px;
            border-bottom: 1px solid #f3f3f3;
            cursor: pointer;
            color: #444;
            font-size: 15px;
        }

        .catalog-item:hover {
            background: #fafafa;
        }

        .catalog-item.selected {
            background: #f0f0f0;
            font-weight: 600;
        }

        .info-bottom {
            height: 25vh;
            padding: 0;
            border-top: 1px solid #bbb;
            display: flex;
            align-items: stretch;
        }

        .info-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 16px;
            color: #444;
        }

        .info-table tbody td {
            padding: 18px;
            border-right: 1px solid #ddd;
            vertical-align: top;
            color: #444;
        }

        .info-table tbody tr.info-row-1 td {
            font-weight: 600;
        }

        .info-table tbody tr.info-row-2 td {
            border-top: 1px solid #ddd;
            font-weight: 400;
        }

        .info-table td:last-child {
            border-right: none;
        }

        @media (max-width: 768px) {
            .topbar { height: 56px; }
            .top-center { font-size: 18px; }
            .artwork-box { width: 300px; height: 180px; }
            .info-table tbody td { padding: 10px; font-size: 14px; }
            .catalog { width: 200px; }
            .catalog-item { padding: 8px 12px; font-size: 13px; }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="left-pane">
            <header class="topbar">
                <div class="top-left"><a class="perf-link" href="index.html">&larr; Performance</a></div>
                <div class="top-center">Dictionary</div>
                <div class="top-right"></div>
            </header>

            <div class="main-content">
                <div class="artwork-area">
                    <div class="artwork-box">
                        <canvas id="dictCanvas"></canvas>
                    </div>
                </div>
            </div>

            <div class="info-bottom">
                <table class="info-table">
                    <tbody>
                        <tr class="info-row-1">
                            <td class="name-cell">-</td>
                            <td class="price-cell">-</td>
                            <td class="usage-cell">-</td>
                        </tr>
                        <tr class="info-row-2">
                            <td class="material-cell">Material - related to petroleum</td>
                            <td class="replacement-cell">Replacement object</td>
                            <td class="empty-cell"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <aside class="catalog" id="catalog" aria-label="Object dictionary">
            <div class="catalog-header">Dictionary</div>
        </aside>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="petrolum_list.js"></script>
    <script src="products.js"></script>
    <script src="model_viewer.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const list = (typeof PETROLUM_LIST !== 'undefined') ? PETROLUM_LIST : [];
            const details = (typeof PRODUCT_DETAILS !== 'undefined') ? PRODUCT_DETAILS : {};

            const detailsLower = {};
            Object.keys(details).forEach(k => { detailsLower[k.toLowerCase()] = details[k]; });

            const viewer = new ModelViewer(
                document.getElementById('dictCanvas'),
                document.querySelector('.artwork-area')
            );

            function findDetails(name) {
                return detailsLower[name.toLowerCase()] || null;
            }

            function selectItem(name, el) {
                document.querySelectorAll('.catalog-item').forEach(x => x.classList.remove('selected'));
                if (el) el.classList.add('selected');

                const d = findDetails(name) || {};
                const price = (typeof d.price === 'number') ? `$${d.price.toFixed(2)}` : '-';
                const usage = d.usage || '-';
                const material = d.petroleum || 'Material - related to petroleum';
                const replacement = d.alternative || 'Replacement object';

                document.querySelector('.info-table .name-cell').textContent = name;
                document.querySelector('.info-table .price-cell').textContent = price;
                document.querySelector('.info-table .usage-cell').textContent = usage;
                document.querySelector('.info-table .material-cell').textContent = material;
                document.querySelector('.info-table .replacement-cell').textContent = replacement;

                viewer.loadProduct(name);
            }

            const catalog = document.getElementById('catalog');
            const sorted = list.slice().sort((a, b) => a.localeCompare(b));
            sorted.forEach(name => {
                const el = document.createElement('div');
                el.className = 'catalog-item';
                el.textContent = name;
                el.addEventListener('click', () => selectItem(name, el));
                catalog.appendChild(el);
            });

            const first = catalog.querySelector('.catalog-item');
            if (first) selectItem(first.textContent, first);
        });
    </script>
</body>
</html>
